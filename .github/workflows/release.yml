name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build
        env:
          VERSION: ${{ github.ref_name }}

      - name: Publish to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ vars.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: neoforge/build/libs/!(*-sources|*-dev|*-javadoc).jar
          name: Phonon ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: ${{ contains(github.ref_name, 'beta') && 'beta' || 'release' }}
          loaders: neoforge
          game-versions: 1.21.1
          changelog-file: CHANGELOG.md

      - name: Sync Modrinth Description
        run: |
          curl -X PATCH "https://api.modrinth.com/v2/project/${{ vars.MODRINTH_ID }}" \
            -H "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --rawfile body README.md '{body: $body}')"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: neoforge/build/libs/!(*-sources|*-dev|*-javadoc).jar
          body_path: CHANGELOG.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
